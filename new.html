<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새로 들어왔어요 | 헬로우가든마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    .page-hero {
      background: linear-gradient(135deg, #1a3d28 0%, #2d5a3d 60%, #4a7c59 100%);
      color: #fff;
      padding: 64px 0 56px;
      text-align: center;
    }
    .page-hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    .page-hero p { font-size: 16px; color: rgba(255,255,255,0.72); }

    .posts-section { padding: 64px 0 80px; }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }
    @media (max-width: 640px) { .posts-grid { grid-template-columns: 1fr; } }

    .post-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      border: 1.5px solid rgba(0,0,0,0.07);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }
    .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

    .post-card-image {
      width: 100%;
      aspect-ratio: 16/9;
      background: #e8f0eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
    }
    .post-card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-card-body { padding: 20px 22px 22px; }
    .post-card-date { font-size: 12px; color: var(--color-text-light); margin-bottom: 8px; }
    .post-card-title { font-size: 17px; font-weight: 700; color: var(--color-text); margin-bottom: 10px; line-height: 1.4; }
    .post-card-excerpt {
      font-size: 14px; color: var(--color-text-sub); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .state-box { text-align: center; padding: 80px 24px; color: var(--color-text-light); }
    .state-box .icon { font-size: 48px; margin-bottom: 16px; }
    .state-box p { font-size: 15px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: var(--radius-lg);
      max-width: 640px; width: 100%; max-height: 88vh;
      overflow-y: auto; position: relative; box-shadow: var(--shadow-lg);
    }
    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; font-size: 24px;
      cursor: pointer; color: var(--color-text-sub); line-height: 1; z-index: 10;
    }
    .modal-close:hover { color: var(--color-text); }
    .modal-image {
      width: 100%; aspect-ratio: 16/9;
      background: #e8f0eb; display: flex;
      align-items: center; justify-content: center; font-size: 64px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden;
    }
    .modal-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-body { padding: 28px 30px 30px; }
    .modal-meta { font-size: 12px; color: var(--color-text-light); margin-bottom: 10px; }
    .modal-title { font-size: 22px; font-weight: 900; letter-spacing: -0.03em; color: var(--color-text); margin-bottom: 16px; line-height: 1.35; }
    .modal-content { font-size: 15px; color: var(--color-text-sub); line-height: 1.75; white-space: pre-line; }
    .modal-actions { margin-top: 24px; display: flex; gap: 12px; }

    .cart-badge {
      position: absolute; top: -6px; right: -8px;
      background: var(--color-danger); color: #fff;
      border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
      min-width: 18px; height: 18px; display: none;
      align-items: center; justify-content: center; padding: 0 4px;
    }
    .mobile-menu.open { display: block; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  </style>
</head>
<body>

<header class="header">
  <nav class="container">
    <a href="/index.html" class="nav-logo"><img src="/assets/logo/logo.png" alt="헬로우가든마켓" style="width:32px;height:32px;object-fit:contain;"> Hello Garden Market</a>
    <ul class="nav-links">
      <li><a href="/index.html">홈</a></li>
      <li><a href="/shop.html">쇼핑하기</a></li>
      <li><a href="/new.html">새로 들어왔어요</a></li>
      <li><a href="/gallery.html">매장 구경하기</a></li>
      <li><a href="/qna.html">묻고 답하기</a></li>
      <li><a href="/review-event.html">리뷰 이벤트</a></li>
      <li><a href="/about.html">매장 소개</a></li>
    </ul>
    <div class="nav-actions">
      <div id="nav-auth"></div>
      <a href="/cart.html" class="cart-icon" style="position:relative;">🛒 <span id="cart-count" class="cart-badge">0</span></a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <ul>
      <li><a href="/index.html">홈</a></li>
      <li><a href="/shop.html">쇼핑하기</a></li>
      <li><a href="/new.html">새로 들어왔어요</a></li>
      <li><a href="/gallery.html">매장 구경하기</a></li>
      <li><a href="/qna.html">묻고 답하기</a></li>
      <li><a href="/review-event.html">리뷰 이벤트</a></li>
      <li><a href="/about.html">매장 소개</a></li>
    </ul>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>새로 들어왔어요 🌱</h1>
    <p>가장 먼저 입고된 식물들을 만나보세요</p>
  </div>
</section>

<section class="posts-section">
  <div class="container">
    <div id="posts-container">
      <div class="state-box">
        <div class="icon">🌿</div>
        <p>불러오는 중...</p>
      </div>
    </div>
  </div>
</section>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="닫기">×</button>
    <div class="modal-image" id="modal-image">🌿</div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-content" id="modal-content"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="nav-logo" style="margin-bottom:12px;"><span class="logo-icon">🌻</span> Hello Garden Market</div>
    <div class="footer-links">
      <a href="/about.html">매장 소개</a>
      <a href="#">개인정보처리방침</a>
      <a href="#">이용약관</a>
    </div>
    <p class="footer-copy">© 2026 헬로우가든마켓. All rights reserved.</p>
  </div>
</footer>

<script type="module">
  import { updateNavAuth } from '/js/auth.js'
  import { updateCartBadge } from '/js/utils/cart.js'
  import { getPosts } from '/js/api/posts.js'
  import { trackEvent } from '/js/api/analytics.js'

  const hamburger = document.getElementById('hamburger')
  const mobileMenu = document.getElementById('mobile-menu')
  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('open')
    hamburger.classList.toggle('open')
  })

  updateNavAuth()
  updateCartBadge()
  trackEvent({ eventType: 'page_view', page: 'new' })

  function formatDate(iso) {
    if (!iso) return ''
    const d = new Date(iso)
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`
  }

  function stripTags(str) {
    return str ? str.replace(/<[^>]*>/g, '') : ''
  }

  function createPostCard(post) {
    const card = document.createElement('div')
    card.className = 'post-card'

    const imgWrap = document.createElement('div')
    imgWrap.className = 'post-card-image'
    const cardImgSrc = post.image_url || post.thumbnail
    if (cardImgSrc) {
      const img = document.createElement('img')
      img.src = cardImgSrc
      img.alt = post.title || ''
      img.loading = 'lazy'
      img.onerror = () => { imgWrap.textContent = '🌿' }
      imgWrap.appendChild(img)
    } else {
      imgWrap.textContent = '🌿'
    }

    const body = document.createElement('div')
    body.className = 'post-card-body'

    const date = document.createElement('div')
    date.className = 'post-card-date'
    date.textContent = formatDate(post.created_at)

    const title = document.createElement('div')
    title.className = 'post-card-title'
    title.textContent = post.title || '제목 없음'

    const excerpt = document.createElement('div')
    excerpt.className = 'post-card-excerpt'
    excerpt.textContent = stripTags(post.content || '').slice(0, 100)

    body.appendChild(date)
    body.appendChild(title)
    body.appendChild(excerpt)
    card.appendChild(imgWrap)
    card.appendChild(body)

    card.addEventListener('click', () => openModal(post))
    return card
  }

  function renderPosts(posts) {
    const container = document.getElementById('posts-container')
    container.textContent = ''

    if (!posts || posts.length === 0) {
      const box = document.createElement('div')
      box.className = 'state-box'
      const icon = document.createElement('div')
      icon.className = 'icon'
      icon.textContent = '🌱'
      const msg = document.createElement('p')
      msg.textContent = '아직 등록된 게시글이 없어요'
      box.appendChild(icon)
      box.appendChild(msg)
      container.appendChild(box)
      return
    }

    const grid = document.createElement('div')
    grid.className = 'posts-grid'
    posts.forEach(post => grid.appendChild(createPostCard(post)))
    container.appendChild(grid)
  }

  function openModal(post) {
    const overlay = document.getElementById('modal-overlay')
    const imageEl = document.getElementById('modal-image')
    const metaEl = document.getElementById('modal-meta')
    const titleEl = document.getElementById('modal-title')
    const contentEl = document.getElementById('modal-content')
    const actionsEl = document.getElementById('modal-actions')

    imageEl.textContent = ''
    const modalImgSrc = post.image_url || post.thumbnail
    if (modalImgSrc) {
      const img = document.createElement('img')
      img.src = modalImgSrc
      img.alt = post.title || ''
      img.onerror = () => { imageEl.textContent = '🌿' }
      imageEl.appendChild(img)
    } else {
      imageEl.textContent = '🌿'
    }

    metaEl.textContent = formatDate(post.created_at)
    titleEl.textContent = post.title || '제목 없음'
    contentEl.textContent = stripTags(post.content || '')

    actionsEl.textContent = ''
    if (post.product_id) {
      const buyBtn = document.createElement('a')
      buyBtn.href = '/shop.html?product=' + encodeURIComponent(post.product_id)
      buyBtn.className = 'btn btn-primary'
      buyBtn.textContent = '바로 구매하기'
      actionsEl.appendChild(buyBtn)
    }

    overlay.classList.add('open')
    document.body.style.overflow = 'hidden'
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open')
    document.body.style.overflow = ''
  }

  document.getElementById('modal-close').addEventListener('click', closeModal)
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal()
  })
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal() })

  async function loadPosts() {
    const result = await getPosts({ type: 'new_arrival', limit: 20 })
    if (result && result.error) {
      const container = document.getElementById('posts-container')
      container.textContent = ''
      const box = document.createElement('div')
      box.className = 'state-box'
      const icon = document.createElement('div')
      icon.className = 'icon'
      icon.textContent = '⚠️'
      const msg = document.createElement('p')
      msg.textContent = '게시글을 불러오지 못했어요. 잠시 후 다시 시도해주세요.'
      box.appendChild(icon)
      box.appendChild(msg)
      container.appendChild(box)
      return
    }
    renderPosts(Array.isArray(result) ? result : [])
  }

  loadPosts()
</script>
</body>
</html>
