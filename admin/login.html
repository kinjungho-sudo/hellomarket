<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — 헬로우가든마켓</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3d28 0%, #2d5a3d 100%);
      font-family: var(--font-main);
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .login-logo { font-size: 36px; margin-bottom: 8px; }
    .login-title {
      font-size: 20px;
      font-weight: 900;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--color-text-light);
      margin-bottom: 36px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 50px;
      background: #fff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-main);
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google-icon { flex-shrink: 0; width: 20px; height: 20px; }
    .btn-google-label { pointer-events: none; }
    .error-msg {
      display: none;
      background: rgba(244,67,54,0.08);
      border: 1px solid rgba(244,67,54,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--color-danger);
      margin-top: 14px;
    }
    .back-link {
      display: block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-text-light);
      text-decoration: none;
    }
    .back-link:hover { color: var(--color-primary); }
    @media (max-width: 440px) {
      .login-card { padding: 36px 24px 28px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🌻</div>
    <h1 class="login-title">관리자 로그인</h1>
    <p class="login-sub">헬로우가든마켓 관리자 전용</p>

    <button class="btn-google" id="btn-google-login">
      <svg class="btn-google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="btn-google-label">Google로 로그인</span>
    </button>

    <div class="error-msg" id="error-msg"></div>
    <a href="/index.html" class="back-link">← 사이트로 돌아가기</a>
  </div>

  <script type="module">
    import { supabase } from '/js/config.js'

    const ALLOWED_UIDS = ['2013c141-5736-4b4c-8202-b423cffdb29a']
    const btn = document.getElementById('btn-google-login')
    const label = btn.querySelector('.btn-google-label')
    const errEl = document.getElementById('error-msg')

    // 이미 로그인된 허가 계정이면 대시보드로
    const { data: { user } } = await supabase.auth.getUser()
    if (user && ALLOWED_UIDS.includes(user.id)) {
      window.location.href = '/admin/index.html'
    }

    // OAuth 리다이렉트 후 세션 변화 감지
    supabase.auth.onAuthStateChange((_event, session) => {
      if (!session) return
      if (ALLOWED_UIDS.includes(session.user.id)) {
        window.location.href = '/admin/index.html'
      } else {
        errEl.textContent = '접근 권한이 없는 계정입니다.'
        errEl.style.display = 'block'
        supabase.auth.signOut()
      }
    })

    btn.addEventListener('click', async () => {
      btn.disabled = true
      label.textContent = '연결 중...'
      errEl.style.display = 'none'

      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/admin/login.html' }
      })

      if (error) {
        errEl.textContent = 'Google 로그인에 실패했습니다. 다시 시도해 주세요.'
        errEl.style.display = 'block'
        btn.disabled = false
        label.textContent = 'Google로 로그인'
      }
    })
  </script>
</body>
</html>
