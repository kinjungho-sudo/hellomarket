<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — 헬로우가든마켓</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3d28 0%, #2d5a3d 100%);
      font-family: var(--font-main);
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 36px;
    }
    .login-title {
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-light);
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-sub);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      font-size: 15px;
      font-family: var(--font-main);
      color: var(--color-text);
      background: var(--color-bg);
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: #fff;
    }
    .btn-login {
      width: 100%;
      height: 48px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
      font-family: var(--font-main);
    }
    .btn-login:hover { background: var(--color-primary-dark); transform: translateY(-1px); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .error-msg {
      display: none;
      background: rgba(244,67,54,0.08);
      border: 1px solid rgba(244,67,54,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--color-danger);
      margin-top: 12px;
      text-align: center;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--color-text-light);
      text-decoration: none;
    }
    .back-link:hover { color: var(--color-primary); }
    @media (max-width: 440px) {
      .login-card { padding: 36px 24px 28px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🌻</div>
    <h1 class="login-title">관리자 페이지</h1>
    <p class="login-sub">헬로우가든마켓 관리자 전용</p>

    <form id="admin-login-form" novalidate>
      <div class="form-group">
        <label for="admin-password">비밀번호</label>
        <input type="password" id="admin-password" placeholder="관리자 비밀번호 입력" autofocus autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btn-login">로그인</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <a href="/index.html" class="back-link">← 사이트로 돌아가기</a>
  </div>

  <script type="module">
    import { adminLogin, isAdminAuthed } from '/js/utils/admin-auth.js'

    // 이미 인증된 경우 대시보드로
    if (isAdminAuthed()) {
      window.location.href = '/admin/index.html'
    }

    const form   = document.getElementById('admin-login-form')
    const btn    = document.getElementById('btn-login')
    const errEl  = document.getElementById('error-msg')

    form.addEventListener('submit', async function(e) {
      e.preventDefault()
      const pw = document.getElementById('admin-password').value.trim()
      if (!pw) { showError('비밀번호를 입력해 주세요.'); return }

      btn.disabled = true
      btn.textContent = '확인 중...'
      errEl.style.display = 'none'

      const result = await adminLogin(pw)
      if (result.success) {
        window.location.href = '/admin/index.html'
      } else {
        showError(result.error || '로그인에 실패했습니다.')
        btn.disabled = false
        btn.textContent = '로그인'
      }
    })

    function showError(msg) {
      errEl.textContent = msg
      errEl.style.display = 'block'
    }
  </script>
</body>
</html>
