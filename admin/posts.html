<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입고 소식 관리 — 헬로우가든마켓 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:var(--radius-lg); padding:32px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; }
    .modal-title { font-size:18px; font-weight:800; margin-bottom:24px; }
    .modal-footer { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; padding-top:20px; border-top:1px solid #eee; }
    .img-placeholder { width:60px; height:60px; background:#f5f5f5; border-radius:var(--radius-sm); border:1px dashed #ddd; display:flex; align-items:center; justify-content:center; font-size:20px; }
  </style>
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-logo">🌻 HGM 관리자</div>
    <div class="admin-sidebar-label">메인</div>
    <a href="/admin/index.html">📊 대시보드</a>
    <div class="admin-sidebar-label">콘텐츠</div>
    <a href="/admin/products.html">🌿 상품 관리</a>
    <a href="/admin/gallery.html">🖼️ 갤러리 관리</a>
    <a href="/admin/posts.html" class="active">📰 입고 소식</a>
    <div class="admin-sidebar-label">고객</div>
    <a href="/admin/orders.html">📦 주문 관리</a>
    <a href="/admin/qna.html">💬 묻고 답하기</a>
    <a href="/admin/reviews.html">⭐ 리뷰 이벤트</a>
    <div class="admin-sidebar-label">시스템</div>
    <a href="/admin/settings.html">⚙️ 알림 설정</a>
    <a href="../index.html">← 사이트로 이동</a>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="admin-menu-toggle" id="menu-toggle">☰</button>
        <span class="admin-header-title">입고 소식 관리</span>
      </div>
      <div class="admin-header-user">
        <button class="btn btn-primary" id="btn-add-post" style="font-size:13px;">+ 포스트 작성</button>
        <button class="btn btn-ghost" id="btn-logout" style="font-size:13px;">로그아웃</button>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:60px;">이미지</th>
              <th>제목</th>
              <th>유형</th>
              <th>연결 상품</th>
              <th>발행</th>
              <th>조회수</th>
              <th>작성일</th>
              <th style="width:100px;">관리</th>
            </tr>
          </thead>
          <tbody id="posts-body">
            <tr><td colspan="8" style="text-align:center; padding:40px; color:var(--color-text-light);">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="pagination" style="display:flex; gap:8px; justify-content:center; margin-top:20px;"></div>
    </div>
  </div>
</div>

<!-- 포스트 등록/수정 모달 -->
<div class="modal-overlay" id="post-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">포스트 작성</div>
    <form id="post-form">
      <input type="hidden" id="post-id">

      <div class="admin-form-group">
        <label>유형</label>
        <select class="admin-input" id="pt-type">
          <option value="new_arrival">🌿 입고 소식</option>
          <option value="guide">📖 가드닝 가이드</option>
        </select>
      </div>

      <div class="admin-form-group">
        <label>제목 *</label>
        <input type="text" class="admin-input" id="pt-title" required placeholder="포스트 제목">
      </div>

      <div class="admin-form-group">
        <label>내용</label>
        <textarea class="admin-textarea" id="pt-content" rows="6" placeholder="포스트 내용을 입력하세요"></textarea>
      </div>

      <div class="admin-form-group">
        <label>이미지</label>
        <input type="file" id="pt-image-file" accept="image/*" style="display:block; margin-bottom:8px;">
        <div id="pt-image-preview" class="img-placeholder">📷</div>
        <input type="hidden" id="pt-image-url">
      </div>

      <div class="admin-form-group">
        <label>연결 상품 ID <span style="font-size:11px; color:var(--color-text-light);">(선택)</span></label>
        <input type="text" class="admin-input" id="pt-product-id" placeholder="상품 UUID">
      </div>

      <div class="admin-form-group">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
          <input type="checkbox" id="pt-is-published"> 발행 (체크 시 사이트에 공개됩니다)
        </label>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="btn-modal-cancel">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box" style="max-width:400px;">
    <div class="modal-title">포스트 삭제</div>
    <p style="color:var(--color-text-sub); margin-bottom:24px;">이 포스트를 삭제하시겠어요?</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-delete-cancel">취소</button>
      <button class="btn" id="btn-delete-confirm" style="background:var(--color-danger); color:#fff;">삭제</button>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/admin/posts.js"></script>
</body>
</html>
