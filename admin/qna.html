<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>묻고 답하기 관리 — 헬로우가든마켓 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid #eee; }
    .tab-btn { padding:10px 20px; font-size:14px; font-weight:600; border:none; background:none; cursor:pointer; color:var(--color-text-sub); border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab-btn.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:var(--radius-lg); padding:32px; width:100%; max-width:620px; max-height:90vh; overflow-y:auto; }
    .modal-title { font-size:18px; font-weight:800; margin-bottom:24px; }
    .modal-footer { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; padding-top:20px; border-top:1px solid #eee; }
    .qna-question-box { background:#f9f9f9; border-radius:var(--radius-sm); padding:16px; margin-bottom:16px; font-size:14px; line-height:1.6; }
    .qna-question-meta { font-size:12px; color:var(--color-text-light); margin-bottom:8px; }
    .unanswered-highlight { background-color:#fff8e1 !important; }
  </style>
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-logo">🌻 HGM 관리자</div>
    <div class="admin-sidebar-label">메인</div>
    <a href="index.html">📊 대시보드</a>
    <div class="admin-sidebar-label">콘텐츠</div>
    <a href="products.html">🌿 상품 관리</a>
    <a href="gallery.html">🖼️ 갤러리 관리</a>
    <a href="posts.html">📰 입고 소식</a>
    <div class="admin-sidebar-label">고객</div>
    <a href="orders.html">📦 주문 관리</a>
    <a href="qna.html" class="active">💬 묻고 답하기</a>
    <a href="reviews.html">⭐ 리뷰 이벤트</a>
    <div class="admin-sidebar-label">시스템</div>
    <a href="settings.html">⚙️ 알림 설정</a>
    <a href="../index.html">← 사이트로 이동</a>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="admin-menu-toggle" id="menu-toggle">☰</button>
        <span class="admin-header-title">묻고 답하기 관리</span>
      </div>
      <div class="admin-header-user">
        <button class="btn btn-ghost" id="btn-logout" style="font-size:13px;">로그아웃</button>
      </div>
    </header>

    <div class="admin-content">
      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab-btn active" data-filter="all">전체 <span id="count-all"></span></button>
        <button class="tab-btn" data-filter="unanswered">미답변 <span id="count-unanswered" style="color:var(--color-warning);"></span></button>
        <button class="tab-btn" data-filter="answered">답변완료</button>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:40px;">#</th>
              <th>제목</th>
              <th>작성자</th>
              <th>비밀글</th>
              <th>상태</th>
              <th>작성일</th>
              <th style="width:100px;">관리</th>
            </tr>
          </thead>
          <tbody id="qna-body">
            <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--color-text-light);">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="pagination" style="display:flex; gap:8px; justify-content:center; margin-top:20px;"></div>
    </div>
  </div>
</div>

<!-- Q&A 상세 + 답변 모달 -->
<div class="modal-overlay" id="qna-modal">
  <div class="modal-box">
    <div class="modal-title">Q&A 답변</div>

    <!-- 질문 내용 -->
    <div class="qna-question-box">
      <div class="qna-question-meta">
        <span id="qna-author">—</span> &nbsp;·&nbsp; <span id="qna-date">—</span>
        <span id="qna-secret-badge" style="display:none; margin-left:8px; background:#f0f0f0; padding:2px 8px; border-radius:99px; font-size:11px;">🔒 비밀글</span>
      </div>
      <div style="font-weight:700; margin-bottom:8px;" id="qna-title">—</div>
      <div style="color:var(--color-text-sub);" id="qna-content">—</div>
    </div>

    <!-- 기존 답변 (있을 경우) -->
    <div id="existing-answer-wrap" style="display:none; margin-bottom:16px; padding:16px; background:#e8f5e9; border-radius:var(--radius-sm);">
      <div style="font-size:12px; font-weight:700; color:var(--color-success); margin-bottom:8px;">✅ 기존 답변</div>
      <div id="existing-answer" style="font-size:14px; line-height:1.6;"></div>
    </div>

    <!-- 답변 작성 -->
    <div class="admin-form-group">
      <label>답변 내용</label>
      <textarea class="admin-textarea" id="qna-answer" rows="5" placeholder="고객에게 보낼 답변을 작성하세요"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-qna-modal-close">닫기</button>
      <button class="btn btn-ghost" id="btn-qna-delete" style="color:var(--color-danger);">삭제</button>
      <button class="btn btn-primary" id="btn-qna-answer-save">답변 등록</button>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/admin/qna.js"></script>
</body>
</html>
