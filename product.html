<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 상세 | 헬로우가든마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    /* 뒤로가기 버튼 */
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 20px;
      height: 36px; padding: 0 14px;
      background: none; border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; color: var(--color-text-sub);
      cursor: pointer; transition: all 0.18s;
      font-family: var(--font-main);
    }
    .btn-back:hover { border-color: var(--color-primary); color: var(--color-primary); background: #f0f7f2; }

    /* -----------------------------------------------
       상품 상세 레이아웃
    ----------------------------------------------- */
    .product-detail {
      padding: 32px 0 80px;
    }

    /* 2컬럼 레이아웃 */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: start;
    }

    /* -----------------------------------------------
       좌: 상품 이미지
    ----------------------------------------------- */
    .product-image-wrap {
      position: sticky;
      top: calc(var(--nav-height) + 24px);
    }

    .product-image-main {
      aspect-ratio: 1 / 1;
      background: #f5f5f5;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1.5px solid rgba(0,0,0,.08);
    }

    .product-image-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* -----------------------------------------------
       우: 상품 정보
    ----------------------------------------------- */
    .product-info {}

    .product-info__category {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      background: var(--color-yellow);
      color: var(--color-text-on-yellow);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .product-info__name {
      font-family: var(--font-main);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 900;
      color: var(--color-text);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    /* 가격 영역 */
    .product-info__price-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .product-info__price {
      font-size: 28px;
      font-weight: 900;
      color: var(--color-green-dark);
      letter-spacing: -0.03em;
    }

    .product-info__original-price {
      font-size: 16px;
      color: var(--color-text-light);
      text-decoration: line-through;
      font-weight: 400;
    }

    .product-info__delivery {
      font-size: 13px;
      color: var(--color-text-sub);
      margin-bottom: 16px;
    }

    /* 상태 뱃지 */
    .product-status-badge {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .product-status-badge.active   { background: #e8f5e9; color: #2d5a3d; }
    .product-status-badge.season   { background: #fff3e0; color: #e65100; }
    .product-status-badge.sold_out { background: #f5f5f5; color: #9e9e9e; }

    /* 관리 아이콘 */
    .product-info__care {
      display: flex;
      gap: 24px;
      padding: 16px 20px;
      background: var(--color-bg-section);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }
    .product-info__care-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-text-sub);
    }
    .product-info__care-icon { font-size: 20px; }
    .product-info__care-label { font-size: 11px; font-weight: 700; color: var(--color-text-light); text-transform: uppercase; display: block; margin-bottom: 2px; }
    .product-info__care-value { font-size: 13px; font-weight: 600; color: var(--color-text); }

    /* 구분선 */
    .product-divider {
      height: 1px;
      background: rgba(0,0,0,.08);
      margin: 20px 0;
    }

    /* 상세 설명 */
    .product-info__desc {
      font-size: 15px;
      line-height: 1.75;
      color: var(--color-text-sub);
      margin-bottom: 24px;
      white-space: pre-line;
    }

    /* 수량 선택 */
    .qty-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 10px;
      display: block;
    }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      width: fit-content;
      border: 1.5px solid rgba(0,0,0,.15);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .qty-btn {
      width: 40px;
      height: 40px;
      background: var(--color-bg-section);
      border: none;
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      cursor: pointer;
      transition: background-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { background: #e0e0e0; }
    .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .qty-input {
      width: 56px;
      height: 40px;
      text-align: center;
      border: none;
      border-left: 1.5px solid rgba(0,0,0,.1);
      border-right: 1.5px solid rgba(0,0,0,.1);
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text);
      font-family: var(--font-main);
      background: #ffffff;
    }
    .qty-input:focus { outline: none; }

    /* 구매 액션 버튼 */
    .product-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .btn-cart-main {
      flex: 1;
      height: 52px;
      background: var(--color-yellow);
      color: var(--color-text-on-yellow);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    .btn-cart-main:hover { background: var(--color-yellow-dark); box-shadow: var(--shadow-yellow); }
    .btn-cart-main:active { transform: scale(0.99); }
    .btn-cart-main:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }
    .btn-buynow-main {
      flex: 1;
      height: 52px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    .btn-buynow-main:hover { background: var(--color-primary-dark); box-shadow: var(--shadow-md); }
    .btn-buynow-main:active { transform: scale(0.99); }
    .btn-buynow-main:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }
    .btn-wish-main {
      width: 52px;
      height: 52px;
      background: #ffffff;
      border: 2px solid rgba(0,0,0,.15);
      border-radius: var(--radius-sm);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease, color 0.2s ease;
      color: var(--color-text-sub);
    }
    .btn-wish-main:hover { border-color: #e53935; color: #e53935; }
    .btn-wish-main.active { color: #e53935; border-color: #e53935; background: #fff5f5; }

    /* 안심 문구 */
    .product-reassurance {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .product-reassurance__item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-sub);
    }

    /* -----------------------------------------------
       관련 상품 섹션
    ----------------------------------------------- */
    .related-section {
      padding: 64px 0 80px;
      background: var(--color-bg-section);
    }

    .related-section .section-title {
      margin-bottom: 32px;
    }

    /* 카드 하단 액션 */
    .product-card__actions {
      padding: 0 16px 16px;
    }
    .product-card__actions .btn-cart-sm {
      width: 100%;
      height: 36px;
      background: var(--color-yellow);
      color: var(--color-text-on-yellow);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }
    .product-card__actions .btn-cart-sm:hover { background: var(--color-yellow-dark); box-shadow: var(--shadow-yellow); }
    .product-card__actions .btn-cart-sm:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }

    /* 로딩 / 에러 */
    .detail-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }
    .detail-error {
      text-align: center;
      padding: 80px 24px;
      color: var(--color-text-sub);
    }
    .detail-error__icon { font-size: 48px; margin-bottom: 16px; }

    /* -----------------------------------------------
       리뷰 / Q&A 탭 섹션
    ----------------------------------------------- */
    .tab-section {
      padding: 64px 0 80px;
      background: #fff;
      border-top: 1px solid rgba(0,0,0,.07);
    }
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 2px solid rgba(0,0,0,.08);
      margin-bottom: 40px;
    }
    .tab-nav__btn {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-light);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-nav__btn.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 리뷰 작성 폼 */
    .review-form-box {
      background: var(--color-bg-section);
      border-radius: var(--radius-md);
      padding: 28px;
      margin-bottom: 40px;
    }
    .review-form-box h3 { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: var(--color-text); }
    .star-select { display: flex; gap: 6px; margin-bottom: 16px; }
    .star-select button {
      font-size: 28px; background: none; border: none; cursor: pointer;
      color: #ddd; transition: color 0.15s; line-height: 1;
    }
    .star-select button.on { color: #f5c518; }
    .review-textarea {
      width: 100%; min-height: 100px; padding: 12px 14px;
      border: 1.5px solid rgba(0,0,0,.15); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font-main); resize: vertical;
      color: var(--color-text); line-height: 1.6;
    }
    .review-textarea:focus { outline: none; border-color: var(--color-primary); }
    .btn-submit-review {
      margin-top: 12px;
      height: 42px; padding: 0 24px;
      background: var(--color-primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit-review:hover { background: var(--color-primary-dark); }

    /* 별점 요약 (상품 정보 영역) */
    .product-rating-summary {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 14px;
    }
    .product-rating-summary__stars { color: #f5c518; font-size: 18px; letter-spacing: 1px; line-height: 1; }
    .product-rating-summary__score { font-size: 20px; font-weight: 900; color: #2c2c2c; }
    .product-rating-summary__count { font-size: 13px; color: var(--color-text-sub); }
    .product-rating-summary__link {
      font-size: 12px; color: var(--color-primary); text-decoration: underline;
      cursor: pointer; background: none; border: none; padding: 0; font-family: inherit;
    }

    /* 리뷰 요약 헤더 (리뷰 탭 상단) */
    .review-summary-header {
      display: flex; align-items: center; gap: 24px;
      background: var(--color-bg-section); border-radius: var(--radius-md);
      padding: 24px 28px; margin-bottom: 32px;
    }
    .review-summary-header__big { text-align: center; min-width: 80px; }
    .review-summary-header__score { font-size: 48px; font-weight: 900; color: var(--color-text); line-height: 1; }
    .review-summary-header__stars { font-size: 22px; color: #f5c518; margin: 6px 0 4px; }
    .review-summary-header__count { font-size: 12px; color: var(--color-text-sub); }
    .review-summary-header__bars { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .rating-bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-sub); }
    .rating-bar-row__label { min-width: 24px; text-align: right; }
    .rating-bar-row__track { flex: 1; height: 8px; background: #e8e0d0; border-radius: 9999px; overflow: hidden; }
    .rating-bar-row__fill { height: 100%; background: #f5c518; border-radius: 9999px; transition: width 0.4s ease; }
    .rating-bar-row__pct { min-width: 28px; text-align: right; }

    /* 리뷰 목록 */
    .review-item {
      padding: 24px 0;
      border-bottom: 1px solid rgba(0,0,0,.07);
    }
    .review-item__header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .review-item__author { font-size: 13px; font-weight: 700; color: var(--color-text); }
    .review-item__stars { color: #f5c518; font-size: 15px; letter-spacing: 1px; }
    .review-item__date { font-size: 12px; color: var(--color-text-light); margin-left: auto; }
    .review-item__rating-text { font-size: 12px; font-weight: 700; color: #f5c518; }
    .review-item__title { font-size: 14px; font-weight: 700; color: var(--color-text); margin-bottom: 4px; }
    .review-item__content { font-size: 14px; color: var(--color-text-sub); line-height: 1.7; }
    .review-item__img {
      width: 80px; height: 80px; object-fit: cover;
      border-radius: var(--radius-sm); margin: 8px 0 10px;
      display: block; cursor: pointer;
    }
    .review-img-label {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; margin-bottom: 4px;
      font-size: 13px; font-weight: 600; color: var(--color-text-sub);
      cursor: pointer; padding: 6px 12px;
      border: 1.5px dashed rgba(0,0,0,.2); border-radius: var(--radius-sm);
    }
    .review-img-label:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .review-empty { text-align: center; padding: 48px 0; color: var(--color-text-light); font-size: 14px; }

    /* Q&A 작성 폼 */
    .qna-form-box {
      background: var(--color-bg-section);
      border-radius: var(--radius-md);
      padding: 28px;
      margin-bottom: 40px;
    }
    .qna-form-box h3 { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: var(--color-text); }
    .qna-input {
      width: 100%; height: 42px; padding: 0 14px;
      border: 1.5px solid rgba(0,0,0,.15); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font-main);
      color: var(--color-text); margin-bottom: 10px;
    }
    .qna-input:focus { outline: none; border-color: var(--color-primary); }
    .qna-textarea {
      width: 100%; min-height: 90px; padding: 12px 14px;
      border: 1.5px solid rgba(0,0,0,.15); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font-main); resize: vertical;
      color: var(--color-text); line-height: 1.6;
    }
    .qna-textarea:focus { outline: none; border-color: var(--color-primary); }
    .qna-form-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; flex-wrap: wrap; gap: 8px;
    }
    .qna-secret-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--color-text-sub); cursor: pointer;
    }
    .btn-submit-qna {
      height: 42px; padding: 0 24px;
      background: var(--color-primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit-qna:hover { background: var(--color-primary-dark); }

    /* Q&A 목록 */
    .qna-item {
      padding: 20px 0;
      border-bottom: 1px solid rgba(0,0,0,.07);
    }
    .qna-item__header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .qna-item__badge {
      font-size: 11px; font-weight: 800; padding: 2px 8px;
      border-radius: var(--radius-full);
    }
    .qna-item__badge.answered { background: #e8f5e9; color: #2d5a3d; }
    .qna-item__badge.pending  { background: #fff3e0; color: #e65100; }
    .qna-item__title { font-size: 14px; font-weight: 700; color: var(--color-text); }
    .qna-item__meta { font-size: 12px; color: var(--color-text-light); margin-left: auto; }
    .qna-item__content { font-size: 13px; color: var(--color-text-sub); line-height: 1.65; margin-bottom: 8px; }
    .qna-item__answer {
      margin-top: 10px; padding: 12px 16px;
      background: #f0f7f0; border-left: 3px solid var(--color-primary);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13px; color: var(--color-text); line-height: 1.65;
    }
    .qna-item__answer strong { display: block; font-size: 12px; color: var(--color-primary); margin-bottom: 4px; }
    .qna-empty { text-align: center; padding: 48px 0; color: var(--color-text-light); font-size: 14px; }
    .login-required-msg {
      text-align: center; padding: 24px;
      background: var(--color-bg-section); border-radius: var(--radius-md);
      font-size: 14px; color: var(--color-text-sub); margin-bottom: 32px;
    }
    .login-required-msg a { color: var(--color-primary); font-weight: 700; text-decoration: underline; }

    /* -----------------------------------------------
       배송 방법 선택기
    ----------------------------------------------- */
    .delivery-selector {
      margin-bottom: 20px;
    }
    .delivery-selector__label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 10px;
      display: block;
    }
    .delivery-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .delivery-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid rgba(0,0,0,.12);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color .18s, background .18s;
      background: #fff;
    }
    .delivery-option:has(input:checked) {
      border-color: var(--color-primary);
      background: #f0f7f2;
    }
    .delivery-option input[type="radio"] {
      margin-top: 2px;
      accent-color: var(--color-primary);
      flex-shrink: 0;
    }
    .delivery-option__body { flex: 1; }
    .delivery-option__title {
      font-size: 14px;
      font-weight: 800;
      color: var(--color-text);
      display: block;
      margin-bottom: 3px;
    }
    .delivery-option__desc {
      font-size: 12px;
      color: var(--color-text-sub);
      line-height: 1.5;
    }
    .delivery-option__fee {
      font-size: 13px;
      font-weight: 800;
      color: var(--color-primary);
      white-space: nowrap;
      align-self: center;
    }

    /* 총 결제금액 표시 */
    .total-price-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--color-bg-section);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    .total-price-wrap__label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-sub);
    }
    .total-price-wrap__amount {
      font-size: 22px;
      font-weight: 900;
      color: var(--color-green-dark);
      letter-spacing: -0.03em;
    }

    /* 알림받기 CTA 박스 */
    .notify-cta-box {
      margin-top: 24px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #f0f7f2 0%, #faf7f0 100%);
      border: 1.5px solid rgba(45, 90, 61, .18);
      border-radius: var(--radius-md);
    }
    .notify-cta-box__title {
      font-size: 14px;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .notify-cta-box__desc {
      font-size: 12px;
      color: var(--color-text-sub);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .notify-cta-box__form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .notify-cta-box__input {
      flex: 1;
      min-width: 160px;
      height: 38px;
      padding: 0 12px;
      border: 1.5px solid rgba(0,0,0,.15);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-main);
      color: var(--color-text);
      background: #fff;
    }
    .notify-cta-box__input:focus { outline: none; border-color: var(--color-primary); }
    .notify-cta-box__btn {
      height: 38px;
      padding: 0 18px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .notify-cta-box__btn:hover { background: var(--color-primary-dark); }

    /* -----------------------------------------------
       반응형 — 모바일
    ----------------------------------------------- */
    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 32px;
      }
      .product-image-wrap { position: static; }
      .product-detail { padding: 32px 0 60px; }
    }

    @media (max-width: 480px) {
      .product-actions { flex-direction: column; }
      .btn-wish-main { width: 100%; }
      .product-info__care { flex-direction: column; gap: 12px; }
    }
  </style>
</head>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { updateNavAuth, getSession } from '/js/auth.js'
    import { updateCartBadge, addToCart } from '/js/utils/cart.js'
    import { getProductById, incrementViewCount, getProducts } from '/js/api/products.js'
    import { trackEvent } from '/js/api/analytics.js'
    import { getSessionId } from '/js/utils/session.js'
    import { supabase } from '/js/config.js'
    import { addToWishlist, removeFromWishlist, isWishlisted } from '/js/api/users.js'

    // 햄버거 메뉴
    const hamburger = document.getElementById('hamburger')
    const mobileMenu = document.getElementById('mobile-menu')
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('open')
      hamburger.classList.toggle('open')
    })

    updateNavAuth()
    updateCartBadge()

    // ---- 토스트 ----
    function showToast(msg, type) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.className = 'toast show' + (type ? ' ' + type : '')
      setTimeout(() => { el.className = 'toast' }, 2800)
    }

    // ---- URL에서 id 추출 ----
    const params = new URLSearchParams(window.location.search)
    const productId = params.get('id')

    if (!productId) {
      window.location.href = '/shop.html'
    }

    // ---- 상태 배지 텍스트 ----
    function getStatusText(status) {
      const map = { active: '판매중', season: '시즌한정', sold_out: '품절', inactive: '준비중' }
      return map[status] || status || ''
    }

    // ---- 상품 상세 렌더 (DOM API) ----
    function renderProductDetail(p) {
      document.title = p.name + ' | 헬로우가든마켓'

      const container = document.getElementById('product-detail-inner')
      container.textContent = ''

      const layout = document.createElement('div')
      layout.className = 'product-layout'

      // ---- 좌: 이미지 ----
      const imgCol = document.createElement('div')
      imgCol.className = 'product-image-wrap'

      const imgWrap = document.createElement('div')
      imgWrap.className = 'product-image-main'
      const img = document.createElement('img')
      img.src = p.image_url || '/assets/images/placeholder.svg'
      img.alt = p.name
      img.onerror = function() { this.src = '/assets/images/placeholder.svg' }
      imgWrap.appendChild(img)
      imgCol.appendChild(imgWrap)

      // ---- 우: 정보 ----
      const infoCol = document.createElement('div')
      infoCol.className = 'product-info'

      // 카테고리 태그
      if (p.category) {
        const catTag = document.createElement('span')
        catTag.className = 'product-info__category'
        catTag.textContent = p.category
        infoCol.appendChild(catTag)
      }

      // 상품명
      const nameEl = document.createElement('h1')
      nameEl.className = 'product-info__name'
      nameEl.textContent = p.name
      infoCol.appendChild(nameEl)

      // 별점 요약 (avg_rating / review_count)
      const ratingRow = document.createElement('div')
      ratingRow.className = 'product-rating-summary'
      ratingRow.id = 'product-rating-summary'
      const avg = parseFloat(p.avg_rating ?? 0)
      const cnt = parseInt(p.review_count ?? 0)

      const starsEl = document.createElement('span')
      starsEl.className = 'product-rating-summary__stars'
      starsEl.textContent = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg))

      const scoreEl = document.createElement('span')
      scoreEl.className = 'product-rating-summary__score'
      scoreEl.textContent = avg > 0 ? avg.toFixed(1) : '–'

      const countEl = document.createElement('span')
      countEl.className = 'product-rating-summary__count'
      countEl.textContent = '리뷰 ' + cnt + '개'

      ratingRow.appendChild(starsEl)
      ratingRow.appendChild(scoreEl)
      ratingRow.appendChild(countEl)

      if (cnt > 0) {
        const linkBtn = document.createElement('button')
        linkBtn.className = 'product-rating-summary__link'
        linkBtn.textContent = '리뷰 보기 ↓'
        linkBtn.addEventListener('click', () => {
          document.getElementById('tab-review-btn')?.click()
          document.querySelector('.tab-section')?.scrollIntoView({ behavior: 'smooth' })
        })
        ratingRow.appendChild(linkBtn)
      }
      infoCol.appendChild(ratingRow)

      // 가격
      const priceWrap = document.createElement('div')
      priceWrap.className = 'product-info__price-wrap'
      const priceEl = document.createElement('span')
      priceEl.className = 'product-info__price'
      priceEl.textContent = Number(p.price).toLocaleString() + '원'
      priceWrap.appendChild(priceEl)
      if (p.original_price) {
        const origEl = document.createElement('span')
        origEl.className = 'product-info__original-price'
        origEl.textContent = Number(p.original_price).toLocaleString() + '원'
        priceWrap.appendChild(origEl)
      }
      infoCol.appendChild(priceWrap)

      // 배송비 기본 안내
      const deliveryEl = document.createElement('p')
      deliveryEl.className = 'product-info__delivery'
      deliveryEl.textContent = '배송비 별도 (방법에 따라 상이)'
      infoCol.appendChild(deliveryEl)

      // 상태 뱃지
      if (p.status) {
        const statusBadge = document.createElement('div')
        statusBadge.className = 'product-status-badge ' + (p.status || 'active')
        statusBadge.textContent = getStatusText(p.status)
        infoCol.appendChild(statusBadge)
      }

      // 관리 아이콘 (광량/물주기)
      if (p.lighting || p.water) {
        const careWrap = document.createElement('div')
        careWrap.className = 'product-info__care'

        if (p.lighting) {
          const item = document.createElement('div')
          item.className = 'product-info__care-item'
          const icon = document.createElement('span')
          icon.className = 'product-info__care-icon'
          icon.textContent = '☀️'
          const txt = document.createElement('div')
          const lbl = document.createElement('span')
          lbl.className = 'product-info__care-label'
          lbl.textContent = '광량'
          const val = document.createElement('span')
          val.className = 'product-info__care-value'
          val.textContent = p.lighting
          txt.appendChild(lbl)
          txt.appendChild(val)
          item.appendChild(icon)
          item.appendChild(txt)
          careWrap.appendChild(item)
        }

        if (p.water) {
          const item = document.createElement('div')
          item.className = 'product-info__care-item'
          const icon = document.createElement('span')
          icon.className = 'product-info__care-icon'
          icon.textContent = '💧'
          const txt = document.createElement('div')
          const lbl = document.createElement('span')
          lbl.className = 'product-info__care-label'
          lbl.textContent = '물주기'
          const val = document.createElement('span')
          val.className = 'product-info__care-value'
          val.textContent = p.water
          txt.appendChild(lbl)
          txt.appendChild(val)
          item.appendChild(icon)
          item.appendChild(txt)
          careWrap.appendChild(item)
        }

        infoCol.appendChild(careWrap)
      }

      // 구분선
      const divider = document.createElement('div')
      divider.className = 'product-divider'
      infoCol.appendChild(divider)

      // 상세 설명
      if (p.description) {
        const desc = document.createElement('p')
        desc.className = 'product-info__desc'
        desc.textContent = p.description
        infoCol.appendChild(desc)
      }

      // ---- 배송 방법 선택기 ----
      const deliverySelector = document.createElement('div')
      deliverySelector.className = 'delivery-selector'
      const dLabel = document.createElement('span')
      dLabel.className = 'delivery-selector__label'
      dLabel.textContent = '배송 방법'
      deliverySelector.appendChild(dLabel)

      const dOptions = document.createElement('div')
      dOptions.className = 'delivery-options'

      const deliveryChoices = [
        { value: 'parcel', icon: '📦', title: '택배', fee: 4000, desc: '전국 배송 · 결제 시 배송비 4,000원 포함' },
        { value: 'quick', icon: '🛵', title: '퀵서비스', fee: 0, desc: '착불 · 사전 협의 필수\n서울 전지역 / 경기 전지역 / 인천 전지역' },
        { value: 'pickup', icon: '🏪', title: '방문수령', fee: 0, desc: '배송비 무료 · 매장 방문 수령' },
      ]
      let selectedDelivery = 'parcel'
      let deliveryFeeAmount = 4000

      deliveryChoices.forEach((ch, idx) => {
        const opt = document.createElement('label')
        opt.className = 'delivery-option'

        const radio = document.createElement('input')
        radio.type = 'radio'
        radio.name = 'delivery-method'
        radio.value = ch.value
        if (idx === 0) radio.checked = true

        radio.addEventListener('change', () => {
          selectedDelivery = ch.value
          deliveryFeeAmount = ch.fee
          updateTotal()
        })

        const body = document.createElement('div')
        body.className = 'delivery-option__body'
        const titleSpan = document.createElement('span')
        titleSpan.className = 'delivery-option__title'
        titleSpan.textContent = ch.icon + ' ' + ch.title
        const descSpan = document.createElement('span')
        descSpan.className = 'delivery-option__desc'
        descSpan.style.whiteSpace = 'pre-line'
        descSpan.textContent = ch.desc
        body.appendChild(titleSpan)
        body.appendChild(descSpan)

        const feeSpan = document.createElement('span')
        feeSpan.className = 'delivery-option__fee'
        feeSpan.textContent = ch.fee === 0 ? (ch.value === 'quick' ? '착불' : '무료') : Number(ch.fee).toLocaleString() + '원'

        opt.appendChild(radio)
        opt.appendChild(body)
        opt.appendChild(feeSpan)
        dOptions.appendChild(opt)
      })
      deliverySelector.appendChild(dOptions)
      infoCol.appendChild(deliverySelector)

      // ---- 수량 선택
      const qtyLabel = document.createElement('span')
      qtyLabel.className = 'qty-label'
      qtyLabel.textContent = '수량'
      infoCol.appendChild(qtyLabel)

      const qtyControl = document.createElement('div')
      qtyControl.className = 'qty-control'

      const qtyMinus = document.createElement('button')
      qtyMinus.className = 'qty-btn'
      qtyMinus.textContent = '−'
      qtyMinus.setAttribute('aria-label', '수량 줄이기')

      const qtyInput = document.createElement('input')
      qtyInput.type = 'number'
      qtyInput.className = 'qty-input'
      qtyInput.value = '1'
      qtyInput.min = '1'
      qtyInput.max = '99'
      qtyInput.readOnly = true
      qtyInput.setAttribute('aria-label', '수량')

      const qtyPlus = document.createElement('button')
      qtyPlus.className = 'qty-btn'
      qtyPlus.textContent = '+'
      qtyPlus.setAttribute('aria-label', '수량 늘리기')

      let qty = 1
      qtyMinus.disabled = true

      qtyControl.appendChild(qtyMinus)
      qtyControl.appendChild(qtyInput)
      qtyControl.appendChild(qtyPlus)
      infoCol.appendChild(qtyControl)

      // 총 결제금액 표시
      const totalWrap = document.createElement('div')
      totalWrap.className = 'total-price-wrap'
      const totalLabel = document.createElement('span')
      totalLabel.className = 'total-price-wrap__label'
      totalLabel.textContent = '총 결제금액'
      const totalAmountEl = document.createElement('span')
      totalAmountEl.className = 'total-price-wrap__amount'
      totalAmountEl.textContent = (Number(p.price) + 4000).toLocaleString() + '원'
      totalWrap.appendChild(totalLabel)
      totalWrap.appendChild(totalAmountEl)
      infoCol.appendChild(totalWrap)

      // 총액 업데이트 (totalAmountEl 선언 이후에 정의)
      function updateTotal() {
        const base = Number(p.price) * qty
        const total = base + deliveryFeeAmount
        totalAmountEl.textContent = total.toLocaleString() + '원'
      }

      qtyMinus.addEventListener('click', () => {
        if (qty > 1) {
          qty--
          qtyInput.value = qty
          qtyMinus.disabled = qty <= 1
          updateTotal()
        }
      })

      qtyPlus.addEventListener('click', () => {
        if (qty < 99) {
          qty++
          qtyInput.value = qty
          qtyMinus.disabled = false
          updateTotal()
        }
      })

      // 구매 액션 버튼
      const actions = document.createElement('div')
      actions.className = 'product-actions'

      const soldOut = p.status === 'sold_out' || p.status === 'inactive'

      const cartBtn = document.createElement('button')
      cartBtn.className = 'btn-cart-main'
      if (soldOut) {
        cartBtn.textContent = '품절된 상품입니다'
        cartBtn.disabled = true
      } else {
        cartBtn.textContent = '장바구니 담기 🛒'
        cartBtn.addEventListener('click', () => {
          addToCart({
            id: String(p.id),
            name: p.name,
            price: p.price,
            delivery: deliveryFeeAmount,
            deliveryMethod: selectedDelivery,
            imageUrl: p.image_url || '',
          }, qty)
          showToast(qty + '개를 장바구니에 담았어요 🛒', 'success')
        })
      }

      const wishBtn = document.createElement('button')
      wishBtn.className = 'btn-wish-main'
      wishBtn.setAttribute('aria-label', '찜하기')
      wishBtn.textContent = '♡'
      wishBtn.dataset.productId = p.id

      // 로그인 상태면 현재 찜 여부 조회
      ;(async () => {
        const { session } = await getSession()
        if (session?.user) {
          const wishlisted = await isWishlisted(session.user.id, p.id)
          if (wishlisted === true) {
            wishBtn.classList.add('active')
            wishBtn.textContent = '♥'
          }
        }
      })()

      wishBtn.addEventListener('click', async () => {
        const { session } = await getSession()
        if (!session?.user) {
          showToast('로그인 후 찜하기를 이용할 수 있어요', '')
          return
        }
        const userId = session.user.id
        const isActive = wishBtn.classList.contains('active')
        if (isActive) {
          wishBtn.classList.remove('active')
          wishBtn.textContent = '♡'
          await removeFromWishlist(userId, p.id)
          showToast('찜 목록에서 제거했어요', '')
        } else {
          wishBtn.classList.add('active')
          wishBtn.textContent = '♥'
          await addToWishlist(userId, p.id)
          showToast('찜 목록에 추가했어요 ♥', 'success')
        }
      })

      // 즉시 구매 버튼
      const buyNowBtn = document.createElement('button')
      buyNowBtn.className = 'btn-buynow-main'
      if (soldOut) {
        buyNowBtn.textContent = '품절'
        buyNowBtn.disabled = true
      } else {
        buyNowBtn.textContent = '즉시 구매'
        buyNowBtn.addEventListener('click', () => {
          sessionStorage.setItem('hgm_buynow', JSON.stringify({
            id: String(p.id),
            name: p.name,
            price: p.price,
            delivery: deliveryFeeAmount,
            imageUrl: p.image_url || '',
            quantity: qty,
          }))
          window.location.href = '/cart.html?buynow=1'
        })
      }

      actions.appendChild(buyNowBtn)
      actions.appendChild(cartBtn)
      actions.appendChild(wishBtn)
      infoCol.appendChild(actions)

      // 안심 문구
      const reassurance = document.createElement('div')
      reassurance.className = 'product-reassurance'
      const items = [
        { icon: '📦', text: '안전 포장 배송' },
        { icon: '🌿', text: '식물 전문가 검수' },
        { icon: '🚚', text: '전국 배송 가능' },
      ]
      items.forEach(item => {
        const el = document.createElement('div')
        el.className = 'product-reassurance__item'
        const icon = document.createElement('span')
        icon.textContent = item.icon
        const text = document.createElement('span')
        text.textContent = item.text
        el.appendChild(icon)
        el.appendChild(text)
        reassurance.appendChild(el)
      })
      infoCol.appendChild(reassurance)

      // ---- 알림받기 CTA ----
      const notifyBox = document.createElement('div')
      notifyBox.className = 'notify-cta-box'

      const notifyTitle = document.createElement('div')
      notifyTitle.className = 'notify-cta-box__title'
      notifyTitle.textContent = '🔔 신상품 입고 알림받기'

      const notifyDesc = document.createElement('div')
      notifyDesc.className = 'notify-cta-box__desc'
      notifyDesc.textContent = '품절 / 재입고 · 이달의 신상품을 가장 먼저 받아보세요'

      const notifyForm = document.createElement('div')
      notifyForm.className = 'notify-cta-box__form'

      const notifyInput = document.createElement('input')
      notifyInput.type = 'email'
      notifyInput.className = 'notify-cta-box__input'
      notifyInput.placeholder = '이메일 주소 입력'

      const notifyBtn = document.createElement('button')
      notifyBtn.type = 'button'
      notifyBtn.className = 'notify-cta-box__btn'
      notifyBtn.textContent = '알림 신청'

      notifyBtn.addEventListener('click', async () => {
        const email = notifyInput.value.trim()
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showToast('올바른 이메일 주소를 입력해주세요', '')
          return
        }
        notifyBtn.disabled = true
        notifyBtn.textContent = '신청 중...'
        try {
          await supabase.from('hgm_notify_subscribers').upsert(
            { email, product_id: productId },
            { onConflict: 'email,product_id' }
          )
          showToast('알림 신청 완료! 입고 시 이메일로 알려드릴게요 🌱', 'success')
          notifyInput.value = ''
        } catch (err) {
          showToast('신청 완료 🌱', 'success')
        } finally {
          notifyBtn.disabled = false
          notifyBtn.textContent = '알림 신청'
        }
      })

      notifyForm.appendChild(notifyInput)
      notifyForm.appendChild(notifyBtn)
      notifyBox.appendChild(notifyTitle)
      notifyBox.appendChild(notifyDesc)
      notifyBox.appendChild(notifyForm)
      infoCol.appendChild(notifyBox)

      layout.appendChild(imgCol)
      layout.appendChild(infoCol)
      container.appendChild(layout)
    }

    // ---- 관련 상품 카드 ----
    function createRelatedCard(p) {
      const card = document.createElement('div')
      card.className = 'product-card'
      card.style.cursor = 'pointer'
      card.addEventListener('click', () => { window.location.href = '/product.html?id=' + p.id })

      if (p.is_new) {
        const badge = document.createElement('span')
        badge.className = 'product-card__badge badge-new'
        badge.textContent = 'NEW'
        card.appendChild(badge)
      }

      const imgWrap = document.createElement('div')
      imgWrap.className = 'product-card__img'
      const img = document.createElement('img')
      img.src = p.image_url || '/assets/images/placeholder.svg'
      img.alt = p.name
      img.loading = 'lazy'
      img.onerror = function() { this.src = '/assets/images/placeholder.svg' }
      imgWrap.appendChild(img)
      card.appendChild(imgWrap)

      const body = document.createElement('div')
      body.className = 'product-card__body'
      const nameEl = document.createElement('p')
      nameEl.className = 'product-card__name'
      nameEl.textContent = p.name
      const priceEl = document.createElement('p')
      priceEl.className = 'product-card__price'
      priceEl.textContent = Number(p.price).toLocaleString() + '원'
      body.appendChild(nameEl)
      body.appendChild(priceEl)
      card.appendChild(body)

      const actions = document.createElement('div')
      actions.className = 'product-card__actions'
      const soldOut = p.status === 'sold_out' || p.status === 'inactive'
      const btn = document.createElement('button')
      btn.className = 'btn-cart-sm'
      if (soldOut) {
        btn.textContent = '품절'
        btn.disabled = true
      } else {
        btn.textContent = '장바구니'
        btn.addEventListener('click', (e) => {
          e.stopPropagation()
          addToCart({ id: String(p.id), name: p.name, price: p.price, imageUrl: p.image_url || '' })
          showToast('장바구니에 담았어요 🛒', 'success')
        })
      }
      actions.appendChild(btn)
      card.appendChild(actions)

      return card
    }

    // ---- 관련 상품 로드 ----
    async function loadRelatedProducts(category, currentId) {
      const section = document.getElementById('related-section')
      const grid = document.getElementById('related-grid')

      const data = await getProducts({ category, limit: 5 })
      if (!data || data.error) return

      const filtered = data.filter(p => String(p.id) !== String(currentId)).slice(0, 4)
      if (filtered.length === 0) return

      grid.textContent = ''
      filtered.forEach(p => grid.appendChild(createRelatedCard(p)))
      section.style.display = 'block'
    }

    // ---- 에러 렌더 ----
    function renderError(msg) {
      const container = document.getElementById('product-detail-inner')
      container.textContent = ''
      const err = document.createElement('div')
      err.className = 'detail-error'
      const icon = document.createElement('div')
      icon.className = 'detail-error__icon'
      icon.textContent = '🌵'
      const text = document.createElement('p')
      text.textContent = msg || '상품을 불러올 수 없습니다.'
      const link = document.createElement('a')
      link.href = '/shop.html'
      link.className = 'btn btn-primary'
      link.style.marginTop = '20px'
      link.textContent = '쇼핑하기로 돌아가기'
      err.appendChild(icon)
      err.appendChild(text)
      err.appendChild(link)
      container.appendChild(err)
    }

    // ---- 탭 전환 ----
    document.querySelectorAll('.tab-nav__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-nav__btn').forEach(b => b.classList.remove('active'))
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active')
      })
    })

    // ---- 별점 선택 UI ----
    function createStarSelect() {
      const wrap = document.createElement('div')
      wrap.className = 'star-select'
      let rating = 0
      const stars = []
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button')
        btn.type = 'button'
        btn.textContent = '★'
        btn.dataset.val = i
        btn.addEventListener('mouseenter', () => stars.forEach((s, idx) => s.classList.toggle('on', idx < i)))
        btn.addEventListener('mouseleave', () => stars.forEach((s, idx) => s.classList.toggle('on', idx < rating)))
        btn.addEventListener('click', () => { rating = i; stars.forEach((s, idx) => s.classList.toggle('on', idx < i)) })
        stars.push(btn)
        wrap.appendChild(btn)
      }
      wrap.getRating = () => rating
      return wrap
    }

    // ---- 로그인 필요 메시지 ----
    function createLoginMsg(text) {
      const msg = document.createElement('div')
      msg.className = 'login-required-msg'
      const link = document.createElement('a')
      link.href = '/login.html'
      link.textContent = '로그인'
      msg.appendChild(link)
      msg.appendChild(document.createTextNode(text))
      return msg
    }

    // ---- 리뷰 섹션 렌더 ----
    async function initReviews(session) {
      const formArea = document.getElementById('review-form-area')
      if (session) {
        const box = document.createElement('div')
        box.className = 'review-form-box'
        const title = document.createElement('h3')
        title.textContent = '리뷰 작성'
        box.appendChild(title)

        const starSelect = createStarSelect()
        box.appendChild(starSelect)

        const textarea = document.createElement('textarea')
        textarea.className = 'review-textarea'
        textarea.placeholder = '이 상품에 대한 솔직한 후기를 남겨주세요 (10자 이상)'
        box.appendChild(textarea)

        // 이미지 업로드
        const imgLabel = document.createElement('label')
        imgLabel.className = 'review-img-label'
        imgLabel.textContent = '📷 사진 첨부 (선택)'
        const imgInput = document.createElement('input')
        imgInput.type = 'file'
        imgInput.accept = 'image/*'
        imgInput.style.cssText = 'display:none;'
        const imgPreview = document.createElement('img')
        imgPreview.style.cssText = 'display:none;width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:6px;'
        let uploadedImageUrl = null

        imgInput.addEventListener('change', async () => {
          const file = imgInput.files?.[0]
          if (!file) return
          imgLabel.textContent = '업로드 중...'
          try {
            const ext = file.name.split('.').pop()
            const filename = 'reviews/' + session.user.id + '_' + Date.now() + '.' + ext
            const { error } = await supabase.storage.from('hgm-images').upload(filename, file, { upsert: true })
            if (error) throw error
            const { data: urlData } = supabase.storage.from('hgm-images').getPublicUrl(filename)
            uploadedImageUrl = urlData.publicUrl
            imgPreview.src = uploadedImageUrl
            imgPreview.style.display = 'block'
            imgLabel.textContent = '📷 사진 변경'
          } catch (err) {
            imgLabel.textContent = '📷 사진 첨부 (선택)'
            showToast('이미지 업로드 실패: ' + err.message, '')
          }
        })

        imgLabel.appendChild(imgInput)
        box.appendChild(imgLabel)
        box.appendChild(imgPreview)

        const submitBtn = document.createElement('button')
        submitBtn.className = 'btn-submit-review'
        submitBtn.textContent = '리뷰 등록'
        submitBtn.addEventListener('click', async () => {
          const rating = starSelect.getRating()
          const content = textarea.value.trim()
          if (!rating) { showToast('별점을 선택해주세요', ''); return }
          if (content.length < 10) { showToast('리뷰는 10자 이상 작성해주세요', ''); return }
          submitBtn.disabled = true
          try {
            const { error } = await supabase.from('hgm_reviews').insert({
              user_id: session.user.id,
              product_id: productId,
              title: document.title.split(' | ')[0],
              content,
              rating,
              image_url: uploadedImageUrl || null,
              is_published: true,
            })
            if (error) throw error
            textarea.value = ''
            uploadedImageUrl = null
            imgPreview.style.display = 'none'
            imgPreview.src = ''
            imgLabel.textContent = '📷 사진 첨부 (선택)'
            showToast('리뷰가 등록되었습니다 🌿', 'success')
            await loadReviews()
          } catch (err) {
            showToast('등록 실패: ' + err.message, '')
          } finally { submitBtn.disabled = false }
        })
        box.appendChild(submitBtn)
        formArea.appendChild(box)
      } else {
        formArea.appendChild(createLoginMsg(' 후 리뷰를 작성할 수 있습니다.'))
      }
      await loadReviews()
    }

    async function loadReviews() {
      const listEl = document.getElementById('review-list')
      listEl.textContent = ''

      const { data, error } = await supabase
        .from('hgm_reviews')
        .select('*, hgm_users(name)')
        .eq('product_id', productId)
        .eq('is_published', true)
        .order('created_at', { ascending: false })
        .limit(20)

      const badge = document.getElementById('review-count-badge')
      if (badge) badge.textContent = data?.length ? '(' + data.length + ')' : ''

      if (error || !data || data.length === 0) {
        const empty = document.createElement('div')
        empty.className = 'review-empty'
        empty.textContent = '아직 등록된 리뷰가 없습니다. 첫 번째 리뷰를 남겨보세요!'
        listEl.appendChild(empty)
        return
      }

      // ---- 별점 분포 요약 헤더 ----
      const ratings = data.map(r => r.rating ?? 0).filter(r => r > 0)
      const avgR = ratings.length ? ratings.reduce((a, b) => a + b, 0) / ratings.length : 0
      const distMap = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 }
      ratings.forEach(r => { if (distMap[r] !== undefined) distMap[r]++ })

      const summaryHeader = document.createElement('div')
      summaryHeader.className = 'review-summary-header'

      const bigEl = document.createElement('div')
      bigEl.className = 'review-summary-header__big'

      const bigScore = document.createElement('div')
      bigScore.className = 'review-summary-header__score'
      bigScore.textContent = avgR.toFixed(1)

      const bigStars = document.createElement('div')
      bigStars.className = 'review-summary-header__stars'
      bigStars.textContent = '★'.repeat(Math.round(avgR)) + '☆'.repeat(5 - Math.round(avgR))

      const bigCount = document.createElement('div')
      bigCount.className = 'review-summary-header__count'
      bigCount.textContent = ratings.length + '개 리뷰'

      bigEl.appendChild(bigScore)
      bigEl.appendChild(bigStars)
      bigEl.appendChild(bigCount)
      summaryHeader.appendChild(bigEl)

      const barsEl = document.createElement('div')
      barsEl.className = 'review-summary-header__bars'
      ;[5, 4, 3, 2, 1].forEach(star => {
        const row = document.createElement('div')
        row.className = 'rating-bar-row'

        const lbl = document.createElement('span')
        lbl.className = 'rating-bar-row__label'
        lbl.textContent = star + '★'

        const track = document.createElement('div')
        track.className = 'rating-bar-row__track'
        const fill = document.createElement('div')
        fill.className = 'rating-bar-row__fill'
        const pct = ratings.length ? Math.round((distMap[star] / ratings.length) * 100) : 0
        fill.style.width = pct + '%'
        track.appendChild(fill)

        const pctEl = document.createElement('span')
        pctEl.className = 'rating-bar-row__pct'
        pctEl.textContent = distMap[star] + '건'

        row.appendChild(lbl)
        row.appendChild(track)
        row.appendChild(pctEl)
        barsEl.appendChild(row)
      })
      summaryHeader.appendChild(barsEl)
      listEl.appendChild(summaryHeader)

      // 상품 정보 영역의 별점 요약도 실제 리뷰 데이터로 갱신
      const summaryEl = document.getElementById('product-rating-summary')
      if (summaryEl) {
        const starsEl = summaryEl.querySelector('.product-rating-summary__stars')
        const scoreEl = summaryEl.querySelector('.product-rating-summary__score')
        const countEl = summaryEl.querySelector('.product-rating-summary__count')
        if (starsEl) starsEl.textContent = '★'.repeat(Math.round(avgR)) + '☆'.repeat(5 - Math.round(avgR))
        if (scoreEl) scoreEl.textContent = avgR > 0 ? avgR.toFixed(1) : '–'
        if (countEl) countEl.textContent = '리뷰 ' + data.length + '개'
      }

      // ---- 리뷰 카드 목록 ----
      data.forEach(r => {
        const item = document.createElement('div')
        item.className = 'review-item'

        const header = document.createElement('div')
        header.className = 'review-item__header'

        const author = document.createElement('span')
        author.className = 'review-item__author'
        author.textContent = r.hgm_users?.name ?? '익명'

        const stars = document.createElement('span')
        stars.className = 'review-item__stars'
        stars.textContent = '★'.repeat(r.rating ?? 0) + '☆'.repeat(5 - (r.rating ?? 0))

        const ratingText = document.createElement('span')
        ratingText.className = 'review-item__rating-text'
        ratingText.textContent = r.rating ? r.rating + '.0' : ''

        const date = document.createElement('span')
        date.className = 'review-item__date'
        date.textContent = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : ''

        header.appendChild(author)
        header.appendChild(stars)
        header.appendChild(ratingText)
        header.appendChild(date)
        item.appendChild(header)

        if (r.title) {
          const titleEl = document.createElement('p')
          titleEl.className = 'review-item__title'
          titleEl.textContent = r.title
          item.appendChild(titleEl)
        }

        // 리뷰 이미지 (있으면)
        if (r.image_url) {
          const revImg = document.createElement('img')
          revImg.src = r.image_url
          revImg.alt = '리뷰 이미지'
          revImg.className = 'review-item__img'
          revImg.loading = 'lazy'
          revImg.onerror = () => { revImg.style.display = 'none' }
          item.appendChild(revImg)
        }

        const content = document.createElement('p')
        content.className = 'review-item__content'
        content.textContent = r.content
        item.appendChild(content)

        listEl.appendChild(item)
      })
    }

    // ---- Q&A 섹션 렌더 ----
    async function initQna(session) {
      const formArea = document.getElementById('qna-form-area')
      if (session) {
        const box = document.createElement('div')
        box.className = 'qna-form-box'
        const title = document.createElement('h3')
        title.textContent = '문의하기'
        box.appendChild(title)

        const titleInput = document.createElement('input')
        titleInput.className = 'qna-input'
        titleInput.placeholder = '제목을 입력해주세요'
        box.appendChild(titleInput)

        const contentArea = document.createElement('textarea')
        contentArea.className = 'qna-textarea'
        contentArea.placeholder = '문의 내용을 입력해주세요'
        box.appendChild(contentArea)

        const footer = document.createElement('div')
        footer.className = 'qna-form-footer'

        const secretLabel = document.createElement('label')
        secretLabel.className = 'qna-secret-label'
        const secretCheck = document.createElement('input')
        secretCheck.type = 'checkbox'
        const secretText = document.createTextNode(' 🔒 비밀글')
        secretLabel.appendChild(secretCheck)
        secretLabel.appendChild(secretText)

        const submitBtn = document.createElement('button')
        submitBtn.className = 'btn-submit-qna'
        submitBtn.textContent = '문의 등록'
        submitBtn.addEventListener('click', async () => {
          const t = titleInput.value.trim()
          const c = contentArea.value.trim()
          if (!t) { showToast('제목을 입력해주세요', ''); return }
          if (!c) { showToast('내용을 입력해주세요', ''); return }
          submitBtn.disabled = true
          try {
            const { error } = await supabase.from('hgm_qna').insert({
              user_id: session.user.id,
              title: t,
              content: c,
              is_secret: secretCheck.checked,
            })
            if (error) throw error
            titleInput.value = ''
            contentArea.value = ''
            secretCheck.checked = false
            showToast('문의가 등록되었습니다 💬', 'success')
            await loadQna(session)
          } catch (err) {
            showToast('등록 실패: ' + err.message, '')
          } finally { submitBtn.disabled = false }
        })

        footer.appendChild(secretLabel)
        footer.appendChild(submitBtn)
        box.appendChild(footer)
        formArea.appendChild(box)
      } else {
        formArea.appendChild(createLoginMsg(' 후 문의를 작성할 수 있습니다.'))
      }
      await loadQna(session)
    }

    async function loadQna(session) {
      const listEl = document.getElementById('qna-list')
      listEl.textContent = ''

      const { data, error } = await supabase
        .from('hgm_qna')
        .select('*, hgm_users(name)')
        .order('created_at', { ascending: false })
        .limit(30)

      const badge = document.getElementById('qna-count-badge')
      if (badge) badge.textContent = data?.length ? '(' + data.length + ')' : ''

      if (error || !data || data.length === 0) {
        const empty = document.createElement('div')
        empty.className = 'qna-empty'
        empty.textContent = '등록된 문의가 없습니다.'
        listEl.appendChild(empty)
        return
      }

      data.forEach(q => {
        const isMyPost = session && session.user.id === q.user_id
        const isSecret = q.is_secret && !isMyPost

        const item = document.createElement('div')
        item.className = 'qna-item'

        const header = document.createElement('div')
        header.className = 'qna-item__header'

        const statusBadge = document.createElement('span')
        statusBadge.className = 'qna-item__badge ' + (q.is_answered ? 'answered' : 'pending')
        statusBadge.textContent = q.is_answered ? '답변완료' : '미답변'

        const titleEl = document.createElement('span')
        titleEl.className = 'qna-item__title'
        titleEl.textContent = isSecret ? '🔒 비밀글입니다.' : q.title

        const meta = document.createElement('span')
        meta.className = 'qna-item__meta'
        meta.textContent = (q.hgm_users?.name ?? '익명') + ' · ' + (q.created_at ? new Date(q.created_at).toLocaleDateString('ko-KR') : '')

        header.appendChild(statusBadge)
        header.appendChild(titleEl)
        header.appendChild(meta)
        item.appendChild(header)

        if (!isSecret) {
          const content = document.createElement('p')
          content.className = 'qna-item__content'
          content.textContent = q.content
          item.appendChild(content)

          if (q.is_answered && q.answer) {
            const answerBox = document.createElement('div')
            answerBox.className = 'qna-item__answer'
            const answerLabel = document.createElement('strong')
            answerLabel.textContent = '🌻 판매자 답변'
            answerBox.appendChild(answerLabel)
            answerBox.appendChild(document.createTextNode(q.answer))
            item.appendChild(answerBox)
          }
        }

        listEl.appendChild(item)
      })
    }

    // ---- 메인 실행 ----
    async function init() {
      if (!productId) return

      const product = await getProductById(productId)

      if (!product || product.error) {
        renderError('상품 정보를 불러오지 못했습니다.')
        return
      }

      renderProductDetail(product)
      incrementViewCount(productId)
      trackEvent({ eventType: 'product_view', productId: productId, page: 'product', sessionId: getSessionId() })

      if (product.category) {
        loadRelatedProducts(product.category, productId)
      }

      // 리뷰 / Q&A 초기화
      const { session } = await getSession()
      await Promise.all([
        initReviews(session),
        initQna(session),
      ])
    }

    init()
  </script>
